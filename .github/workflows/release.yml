name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_version: ${{ steps.meta.outputs.release_version }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
          else
            RELEASE_TAG="v$(node -p "require('./package.json').version")"
          fi
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "release_version=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
        shell: bash
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists"
          else
            gh release create "$RELEASE_TAG" \
              --title "$RELEASE_TAG" \
              --generate-notes \
              --latest
          fi

  verify_ci:
    needs: create_release
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Require successful CI for tagged commit
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
          HEAD_SHA: ${{ github.sha }}
          VERIFY_CI_MAX_ATTEMPTS: "6"
          VERIFY_CI_DELAY_SECONDS: "15"
        shell: bash
        run: node ./scripts/verify-release-ci.mjs

  build:
    needs:
      - create_release
      - verify_ci
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform_name: darwin-aarch64
            runner: macos-14
            rust_target: aarch64-apple-darwin
            bundle_target: app
            bundle_glob: src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
          - platform_name: darwin-x86_64
            runner: macos-15-intel
            rust_target: x86_64-apple-darwin
            bundle_target: app
            bundle_glob: src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz
          - platform_name: linux-aarch64
            runner: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-gnu
            bundle_target: appimage
            bundle_glob: src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
          - platform_name: linux-x86_64
            runner: ubuntu-24.04
            rust_target: x86_64-unknown-linux-gnu
            bundle_target: appimage
            bundle_glob: src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
          - platform_name: windows-aarch64
            runner: windows-11-arm
            rust_target: aarch64-pc-windows-msvc
            bundle_target: msi
            bundle_glob: src-tauri/target/aarch64-pc-windows-msvc/release/bundle/msi/*.msi
          - platform_name: windows-x86_64
            runner: windows-latest
            rust_target: x86_64-pc-windows-msvc
            bundle_target: msi
            bundle_glob: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate signing secrets early
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
        run: |
          if [[ -z "${TAURI_SIGNING_PRIVATE_KEY}" ]]; then
            echo "Missing required secret: TAURI_SIGNING_PRIVATE_KEY" >&2
            exit 1
          fi

          if [[ -z "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD}" ]]; then
            echo "Missing required secret: TAURI_SIGNING_PRIVATE_KEY_PASSWORD" >&2
            exit 1
          fi

          if [[ -z "${TAURI_UPDATER_PUBKEY}" ]]; then
            echo "Missing required secret: TAURI_UPDATER_PUBKEY" >&2
            exit 1
          fi

          first_line="$(printf '%s\n' "${TAURI_SIGNING_PRIVATE_KEY}" | head -n 1)"
          if [[ "${first_line}" != untrusted\ comment:* ]]; then
            echo "TAURI_SIGNING_PRIVATE_KEY is not a complete Tauri updater secret key." >&2
            echo "Expected the first line to start with 'untrusted comment:'." >&2
            exit 1
          fi

          pubkey_first_line="$(printf '%s\n' "${TAURI_UPDATER_PUBKEY}" | head -n 1)"
          if [[ "${pubkey_first_line}" != untrusted\ comment:* ]]; then
            echo "TAURI_UPDATER_PUBKEY is not a complete Tauri updater public key." >&2
            echo "Expected the first line to start with 'untrusted comment:'." >&2
            exit 1
          fi

      - name: Build Tauri release bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
          TAURI_UPDATER_REPO_OWNER: ${{ github.repository_owner }}
          TAURI_UPDATER_REPO_NAME: ${{ github.event.repository.name }}
        run: npm run tauri build -- --target ${{ matrix.rust_target }} --bundles ${{ matrix.bundle_target }}

      - name: Prepare updater manifest
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.create_release.outputs.release_version }}
          RELEASE_HTML_URL: https://github.com/${{ github.repository }}/releases/tag/${{ needs.create_release.outputs.release_tag }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.create_release.outputs.release_tag }}
          PLATFORM_NAME: ${{ matrix.platform_name }}
          BUNDLE_GLOB: ${{ matrix.bundle_glob }}
        run: |
          export RELEASE_PUBLISHED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          BUNDLE_PATH=$(ls $BUNDLE_GLOB | head -n 1)
          SIG_PATH="$BUNDLE_PATH.sig"
          MANIFEST_PATH="updater-${PLATFORM_NAME}.json"
          BUNDLE_NAME=$(basename "$BUNDLE_PATH")
          DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/${BUNDLE_NAME}"
          export RELEASE_DOWNLOAD_URL="$DOWNLOAD_URL"
          export RELEASE_SIGNATURE="$(cat "$SIG_PATH")"
          export MANIFEST_OUTPUT_PATH="$MANIFEST_PATH"
          export PLATFORM_KEY="$PLATFORM_NAME"
          node ./scripts/generate-updater-manifest.mjs
          echo "BUNDLE_PATH=$BUNDLE_PATH" >> "$GITHUB_ENV"
          echo "SIG_PATH=$SIG_PATH" >> "$GITHUB_ENV"
          echo "MANIFEST_PATH=$MANIFEST_PATH" >> "$GITHUB_ENV"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.create_release.outputs.release_tag }}
        run: gh release upload "$RELEASE_TAG" "$BUNDLE_PATH" "$SIG_PATH" "$MANIFEST_PATH" --clobber

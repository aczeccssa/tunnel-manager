name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_version: ${{ steps.meta.outputs.release_version }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
          else
            RELEASE_TAG="v$(node -p "require('./package.json').version")"
          fi
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "release_version=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
        shell: bash
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists"
          else
            gh release create "$RELEASE_TAG" \
              --title "$RELEASE_TAG" \
              --generate-notes \
              --latest
          fi

  verify_ci:
    needs: create_release
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Require successful CI for tagged commit
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
          HEAD_SHA: ${{ github.sha }}
          VERIFY_CI_MAX_ATTEMPTS: "6"
          VERIFY_CI_DELAY_SECONDS: "15"
        shell: bash
        run: node ./scripts/verify-release-ci.mjs

  build:
    needs:
      - create_release
      - verify_ci
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform_name: darwin-aarch64
            runner: macos-14
            rust_target: aarch64-apple-darwin
            bundle_target: app
            bundle_glob: src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
          - platform_name: darwin-x86_64
            runner: macos-15-intel
            rust_target: x86_64-apple-darwin
            bundle_target: app
            bundle_glob: src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz
          - platform_name: linux-aarch64
            runner: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-gnu
            bundle_target: appimage
            bundle_glob: src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
          - platform_name: linux-x86_64
            runner: ubuntu-24.04
            rust_target: x86_64-unknown-linux-gnu
            bundle_target: appimage
            bundle_glob: src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
          - platform_name: windows-aarch64
            runner: windows-11-arm
            rust_target: aarch64-pc-windows-msvc
            bundle_target: msi
            bundle_glob: src-tauri/target/aarch64-pc-windows-msvc/release/bundle/msi/*.msi
          - platform_name: windows-x86_64
            runner: windows-latest
            rust_target: x86_64-pc-windows-msvc
            bundle_target: msi
            bundle_glob: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            xdg-utils \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate signing secrets early
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
        run: |
          node <<'EOF'
          const decodeMaybeBase64 = (value) => {
            const trimmed = value.trim();
            if (trimmed.startsWith("untrusted comment:")) {
              return trimmed;
            }

            try {
              return Buffer.from(trimmed, "base64").toString("utf8").trim();
            } catch {
              return trimmed;
            }
          };

          const required = [
            "TAURI_SIGNING_PRIVATE_KEY",
            "TAURI_SIGNING_PRIVATE_KEY_PASSWORD",
            "TAURI_UPDATER_PUBKEY",
          ];

          for (const name of required) {
            const value = process.env[name];
            if (!value || !value.trim()) {
              console.error(`Missing required secret: ${name}`);
              process.exit(1);
            }
          }

          const validateKey = (name, value, expectedPrefix) => {
            const plainText = decodeMaybeBase64(value);
            const firstLine = plainText.split(/\r?\n/, 1)[0];

            if (!firstLine.startsWith(expectedPrefix)) {
              console.error(`${name} is not a complete Tauri updater key.`);
              console.error(`Expected decoded content to start with '${expectedPrefix}'.`);
              process.exit(1);
            }
          };

          validateKey(
            "TAURI_SIGNING_PRIVATE_KEY",
            process.env.TAURI_SIGNING_PRIVATE_KEY,
            "untrusted comment: rsign encrypted secret key",
          );
          validateKey(
            "TAURI_UPDATER_PUBKEY",
            process.env.TAURI_UPDATER_PUBKEY,
            "untrusted comment: minisign public key",
          );
          EOF

      - name: Normalize updater pubkey
        shell: bash
        env:
          RAW_TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
        run: |
          node <<'EOF' >> "$GITHUB_ENV"
          const raw = process.env.RAW_TAURI_UPDATER_PUBKEY ?? "";
          const trimmed = raw.trim();
          const normalized = trimmed.startsWith("untrusted comment:")
            ? trimmed
            : Buffer.from(trimmed, "base64").toString("utf8").trim();

          process.stdout.write("NORMALIZED_TAURI_UPDATER_PUBKEY<<__EOF__\n");
          process.stdout.write(normalized);
          process.stdout.write("\n__EOF__\n");
          EOF

      - name: Build Tauri release bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_UPDATER_PUBKEY: ${{ env.NORMALIZED_TAURI_UPDATER_PUBKEY }}
          TAURI_UPDATER_REPO_OWNER: ${{ github.repository_owner }}
          TAURI_UPDATER_REPO_NAME: ${{ github.event.repository.name }}
        run: npm run tauri build -- --target ${{ matrix.rust_target }} --bundles ${{ matrix.bundle_target }}

      - name: Prepare updater manifest
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.create_release.outputs.release_version }}
          RELEASE_HTML_URL: https://github.com/${{ github.repository }}/releases/tag/${{ needs.create_release.outputs.release_tag }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.create_release.outputs.release_tag }}
          PLATFORM_NAME: ${{ matrix.platform_name }}
          BUNDLE_GLOB: ${{ matrix.bundle_glob }}
        run: |
          export RELEASE_PUBLISHED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          BUNDLE_PATH=$(ls $BUNDLE_GLOB | head -n 1)
          SIG_PATH="$BUNDLE_PATH.sig"
          MANIFEST_PATH="updater-${PLATFORM_NAME}.json"
          BUNDLE_NAME=$(basename "$BUNDLE_PATH")
          DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/${BUNDLE_NAME}"
          export RELEASE_DOWNLOAD_URL="$DOWNLOAD_URL"
          export RELEASE_SIGNATURE="$(cat "$SIG_PATH")"
          export MANIFEST_OUTPUT_PATH="$MANIFEST_PATH"
          export PLATFORM_KEY="$PLATFORM_NAME"
          node ./scripts/generate-updater-manifest.mjs
          echo "BUNDLE_PATH=$BUNDLE_PATH" >> "$GITHUB_ENV"
          echo "SIG_PATH=$SIG_PATH" >> "$GITHUB_ENV"
          echo "MANIFEST_PATH=$MANIFEST_PATH" >> "$GITHUB_ENV"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.create_release.outputs.release_tag }}
        run: gh release upload "$RELEASE_TAG" "$BUNDLE_PATH" "$SIG_PATH" "$MANIFEST_PATH" --clobber
